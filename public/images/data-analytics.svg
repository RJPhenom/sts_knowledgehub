<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08100d"/>
      <stop offset="100%" style="stop-color:#0c1410"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="16"/></filter>
    <clipPath id="clip"><rect width="600" height="340"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="600" height="340" fill="url(#bg)"/>
    <ellipse cx="300" cy="280" rx="280" ry="100" fill="#4ade80" filter="url(#glow)" opacity="0.12"/>
    <ellipse cx="150" cy="160" rx="140" ry="90" fill="#22d3ee" filter="url(#glow)" opacity="0.1"/>
    <!-- Grid -->
    <g stroke="#1a2820" stroke-width="0.5" opacity="0.8">
      <line x1="0" y1="68" x2="600" y2="68"/><line x1="0" y1="136" x2="600" y2="136"/>
      <line x1="0" y1="204" x2="600" y2="204"/><line x1="0" y1="272" x2="600" y2="272"/>
      <line x1="100" y1="0" x2="100" y2="340"/><line x1="200" y1="0" x2="200" y2="340"/>
      <line x1="300" y1="0" x2="300" y2="340"/><line x1="400" y1="0" x2="400" y2="340"/>
      <line x1="500" y1="0" x2="500" y2="340"/>
    </g>
    <!-- Axes -->
    <line x1="80" y1="40" x2="80" y2="290" stroke="#2a3d30" stroke-width="1.5"/>
    <line x1="80" y1="290" x2="560" y2="290" stroke="#2a3d30" stroke-width="1.5"/>
    <!-- Bars group 1 (green) -->
    <rect x="105" y="200" width="30" height="90" fill="url(#barGrad)" rx="2"/>
    <rect x="175" y="155" width="30" height="135" fill="url(#barGrad)" rx="2"/>
    <rect x="245" y="120" width="30" height="170" fill="url(#barGrad)" rx="2"/>
    <rect x="315" y="90" width="30" height="200" fill="url(#barGrad)" rx="2"/>
    <rect x="385" y="70" width="30" height="220" fill="url(#barGrad)" rx="2"/>
    <rect x="455" y="50" width="30" height="240" fill="url(#barGrad)" rx="2"/>
    <!-- Bars group 2 (cyan, offset) -->
    <rect x="138" y="230" width="30" height="60" fill="url(#bar2)" rx="2" opacity="0.7"/>
    <rect x="208" y="200" width="30" height="90" fill="url(#bar2)" rx="2" opacity="0.7"/>
    <rect x="278" y="170" width="30" height="120" fill="url(#bar2)" rx="2" opacity="0.7"/>
    <rect x="348" y="140" width="30" height="150" fill="url(#bar2)" rx="2" opacity="0.7"/>
    <rect x="418" y="115" width="30" height="175" fill="url(#bar2)" rx="2" opacity="0.7"/>
    <rect x="488" y="95" width="30" height="195" fill="url(#bar2)" rx="2" opacity="0.7"/>
    <!-- Trend line -->
    <polyline points="120,200 190,155 260,118 330,88 400,68 470,48" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.6"/>
    <!-- Axis labels -->
    <g font-family="monospace" font-size="9" fill="#4ade80" opacity="0.5">
      <text x="88" y="294">Q1</text><text x="158" y="294">Q2</text>
      <text x="228" y="294">Q3</text><text x="298" y="294">Q4</text>
      <text x="365" y="294">Q1'26</text><text x="435" y="294">Q2'26</text>
    </g>
    <!-- Legend -->
    <rect x="400" y="22" width="10" height="10" fill="#4ade80" rx="1" opacity="0.8"/>
    <text x="414" y="31" font-family="monospace" font-size="9" fill="#4ade80" opacity="0.6">Automation ROI</text>
    <rect x="400" y="36" width="10" height="10" fill="#22d3ee" rx="1" opacity="0.8"/>
    <text x="414" y="45" font-family="monospace" font-size="9" fill="#22d3ee" opacity="0.6">Labour Cost</text>
    <!-- Vignette -->
    <radialGradient id="vig" cx="50%" cy="50%" r="70%"><stop offset="0%" style="stop-color:#000;stop-opacity:0"/><stop offset="100%" style="stop-color:#000;stop-opacity:0.6"/></radialGradient>
    <rect width="600" height="340" fill="url(#vig)"/>
  </g>
</svg>
