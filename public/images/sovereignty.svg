<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d12"/>
      <stop offset="100%" style="stop-color:#0d1017"/>
    </linearGradient>
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b22234;stop-opacity:0.18"/>
      <stop offset="33%" style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="66%" style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#b22234;stop-opacity:0.18"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#c0392b;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="softblur"><feGaussianBlur stdDeviation="6"/></filter>
    <clipPath id="svgClip"><rect width="600" height="340"/></clipPath>
  </defs>

  <g clip-path="url(#svgClip)">
    <!-- Background -->
    <rect width="600" height="340" fill="url(#bg)"/>

    <!-- Ambient red glow top-center -->
    <ellipse cx="300" cy="80" rx="260" ry="120" fill="url(#glow)" filter="url(#blur)" opacity="0.8"/>

    <!-- Flag colour wash -->
    <rect width="600" height="340" fill="url(#flagGrad)" opacity="0.9"/>

    <!-- Grid -->
    <g stroke="#1c2030" stroke-width="0.5" opacity="0.6">
      <line x1="0" y1="56" x2="600" y2="56"/>
      <line x1="0" y1="113" x2="600" y2="113"/>
      <line x1="0" y1="170" x2="600" y2="170"/>
      <line x1="0" y1="227" x2="600" y2="227"/>
      <line x1="0" y1="284" x2="600" y2="284"/>
      <line x1="100" y1="0" x2="100" y2="340"/>
      <line x1="200" y1="0" x2="200" y2="340"/>
      <line x1="300" y1="0" x2="300" y2="340"/>
      <line x1="400" y1="0" x2="400" y2="340"/>
      <line x1="500" y1="0" x2="500" y2="340"/>
    </g>

    <!-- Parliament dome silhouette -->
    <!-- Main building base -->
    <rect x="130" y="190" width="340" height="110" rx="2" fill="#111520" stroke="#1e2535" stroke-width="1"/>
    <!-- Centre block body -->
    <rect x="180" y="155" width="240" height="145" rx="2" fill="#0f1420" stroke="#1e2535" stroke-width="1"/>
    <!-- Peace Tower -->
    <rect x="263" y="90" width="74" height="120" rx="1" fill="#0d1118" stroke="#1e2535" stroke-width="1"/>
    <!-- Tower spire -->
    <polygon points="300,28 274,92 326,92" fill="#0b0e14" stroke="#c0392b" stroke-width="1.2" opacity="0.9"/>
    <!-- Dome cap glow -->
    <ellipse cx="300" cy="90" rx="37" ry="8" fill="#c0392b" filter="url(#softblur)" opacity="0.35"/>

    <!-- Windows on centre block -->
    <g fill="#1a2540" stroke="#263050" stroke-width="0.5">
      <rect x="195" y="175" width="18" height="26" rx="1"/>
      <rect x="223" y="175" width="18" height="26" rx="1"/>
      <rect x="251" y="175" width="18" height="26" rx="1"/>
      <rect x="333" y="175" width="18" height="26" rx="1"/>
      <rect x="361" y="175" width="18" height="26" rx="1"/>
      <rect x="389" y="175" width="18" height="26" rx="1"/>
      <!-- Lit windows -->
      <rect x="223" y="175" width="18" height="26" rx="1" fill="#2a3d60" stroke="#3a5080"/>
      <rect x="361" y="175" width="18" height="26" rx="1" fill="#2a3d60" stroke="#3a5080"/>
    </g>

    <!-- Tower clock face -->
    <circle cx="300" cy="138" r="12" fill="#0d1118" stroke="#c0392b" stroke-width="1" opacity="0.8"/>
    <circle cx="300" cy="138" r="9" fill="none" stroke="#c0392b" stroke-width="0.5" opacity="0.5"/>
    <!-- Clock hands -->
    <line x1="300" y1="138" x2="300" y2="131" stroke="#c0392b" stroke-width="1.2" opacity="0.9"/>
    <line x1="300" y1="138" x2="306" y2="141" stroke="#c0392b" stroke-width="1" opacity="0.7"/>

    <!-- Maple leaf - stylised, centered high -->
    <g transform="translate(300, 60) scale(0.32)" opacity="0.5">
      <path d="M0,-52 L5,-30 L20,-38 L14,-20 L30,-18 L18,0 L26,2 L0,30 L-26,2 L-18,0 L-30,-18 L-14,-20 L-20,-38 L-5,-30 Z" fill="none" stroke="#c0392b" stroke-width="2.5"/>
    </g>

    <!-- Reflection on ground -->
    <rect x="130" y="298" width="340" height="2" fill="#c0392b" opacity="0.08"/>
    <rect x="200" y="300" width="200" height="1" fill="#c0392b" opacity="0.06"/>

    <!-- Subtle scan line -->
    <rect x="0" y="170" width="600" height="1" fill="#ffffff" opacity="0.03"/>

    <!-- Data overlay - top right -->
    <g font-family="monospace" font-size="9" fill="#c0392b" opacity="0.55">
      <text x="450" y="52">CA-GOV-2026</text>
      <text x="450" y="66">POLICY: ACTIVE</text>
      <text x="450" y="80">SECTOR: AI</text>
    </g>

    <!-- Vignette -->
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.65"/>
    </radialGradient>
    <rect width="600" height="340" fill="url(#vig)"/>
  </g>
</svg>
