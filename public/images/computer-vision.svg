<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" width="760" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="500" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="200" cy="180" rx="220" ry="160" fill="url(#glow1)" filter="url(#blur1)" opacity="0.7"/>
  <ellipse cx="580" cy="340" rx="200" ry="140" fill="url(#glow2)" filter="url(#blur1)" opacity="0.6"/>

  <!-- Grid lines - horizontal -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="62" x2="760" y2="62"/>
    <line x1="0" y1="125" x2="760" y2="125"/>
    <line x1="0" y1="187" x2="760" y2="187"/>
    <line x1="0" y1="250" x2="760" y2="250"/>
    <line x1="0" y1="312" x2="760" y2="312"/>
    <line x1="0" y1="375" x2="760" y2="375"/>
    <line x1="0" y1="437" x2="760" y2="437"/>
  </g>
  <!-- Grid lines - vertical -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.5">
    <line x1="95" y1="0" x2="95" y2="500"/>
    <line x1="190" y1="0" x2="190" y2="500"/>
    <line x1="285" y1="0" x2="285" y2="500"/>
    <line x1="380" y1="0" x2="380" y2="500"/>
    <line x1="475" y1="0" x2="475" y2="500"/>
    <line x1="570" y1="0" x2="570" y2="500"/>
    <line x1="665" y1="0" x2="665" y2="500"/>
  </g>

  <!-- Scan line overlay -->
  <rect x="0" y="0" width="760" height="500" fill="none" stroke="none">
    <animate attributeName="y" from="-500" to="500" dur="6s" repeatCount="indefinite"/>
  </rect>
  <rect x="0" y="110" width="760" height="2" fill="#00d4ff" opacity="0.08"/>

  <!-- Monitor frame -->
  <rect x="120" y="80" width="400" height="270" rx="6" fill="none" stroke="#1e4a6e" stroke-width="1.5" opacity="0.9"/>
  <rect x="130" y="90" width="380" height="250" rx="4" fill="#060d18" opacity="0.9"/>

  <!-- Code lines on monitor -->
  <g font-family="monospace" font-size="11" fill-opacity="0.9">
    <!-- Line 1 -->
    <text x="148" y="118" fill="#569cd6">import</text>
    <text x="196" y="118" fill="#9cdcfe"> cv2</text>
    <text x="222" y="118" fill="#569cd6">,</text>
    <text x="228" y="118" fill="#9cdcfe"> numpy </text>
    <text x="286" y="118" fill="#569cd6">as</text>
    <text x="302" y="118" fill="#9cdcfe"> np</text>
    <!-- Line 2 -->
    <text x="148" y="136" fill="#569cd6">from</text>
    <text x="178" y="136" fill="#9cdcfe"> ultralytics </text>
    <text x="282" y="136" fill="#569cd6">import</text>
    <text x="328" y="136" fill="#4ec9b0"> YOLO</text>
    <!-- Line 3 empty -->
    <!-- Line 4 -->
    <text x="148" y="170" fill="#4ec9b0">model</text>
    <text x="192" y="170" fill="#cccccc"> = </text>
    <text x="210" y="170" fill="#4ec9b0">YOLO</text>
    <text x="240" y="170" fill="#cccccc">(</text>
    <text x="246" y="170" fill="#ce9178">'yolov8n.pt'</text>
    <text x="330" y="170" fill="#cccccc">)</text>
    <!-- Line 5 -->
    <text x="148" y="188" fill="#4ec9b0">cap</text>
    <text x="172" y="188" fill="#cccccc"> = </text>
    <text x="190" y="188" fill="#9cdcfe">cv2</text>
    <text x="214" y="188" fill="#cccccc">.</text>
    <text x="218" y="188" fill="#4ec9b0">VideoCapture</text>
    <text x="318" y="188" fill="#cccccc">(</text>
    <text x="322" y="188" fill="#b5cea8">0</text>
    <text x="330" y="188" fill="#cccccc">)</text>
    <!-- Line 6 empty -->
    <!-- Line 7 -->
    <text x="148" y="222" fill="#c586c0">while</text>
    <text x="186" y="222" fill="#9cdcfe"> cap</text>
    <text x="210" y="222" fill="#cccccc">.</text>
    <text x="214" y="222" fill="#4ec9b0">isOpened</text>
    <text x="278" y="222" fill="#cccccc">():</text>
    <!-- Line 8 -->
    <text x="168" y="240" fill="#4ec9b0">ret</text>
    <text x="188" y="240" fill="#cccccc">, </text>
    <text x="198" y="240" fill="#4ec9b0">frame</text>
    <text x="230" y="240" fill="#cccccc"> = </text>
    <text x="248" y="240" fill="#9cdcfe">cap</text>
    <text x="268" y="240" fill="#cccccc">.</text>
    <text x="272" y="240" fill="#4ec9b0">read</text>
    <text x="296" y="240" fill="#cccccc">()</text>
    <!-- Line 9 -->
    <text x="168" y="258" fill="#4ec9b0">results</text>
    <text x="214" y="258" fill="#cccccc"> = </text>
    <text x="232" y="258" fill="#4ec9b0">model</text>
    <text x="268" y="258" fill="#cccccc">.</text>
    <text x="272" y="258" fill="#4ec9b0">predict</text>
    <text x="316" y="258" fill="#cccccc">(</text>
    <text x="320" y="258" fill="#9cdcfe">frame</text>
    <text x="348" y="258" fill="#cccccc">)</text>
    <!-- Line 10 -->
    <text x="168" y="276" fill="#4ec9b0">annotated</text>
    <text x="232" y="276" fill="#cccccc"> = </text>
    <text x="250" y="276" fill="#9cdcfe">results</text>
    <text x="292" y="276" fill="#cccccc">[</text>
    <text x="296" y="276" fill="#b5cea8">0</text>
    <text x="302" y="276" fill="#cccccc">].</text>
    <text x="308" y="276" fill="#4ec9b0">plot</text>
    <text x="328" y="276" fill="#cccccc">()</text>
    <!-- Line 11 -->
    <text x="168" y="294" fill="#9cdcfe">cv2</text>
    <text x="192" y="294" fill="#cccccc">.</text>
    <text x="196" y="294" fill="#4ec9b0">imshow</text>
    <text x="238" y="294" fill="#cccccc">(</text>
    <text x="242" y="294" fill="#ce9178">'Vision'</text>
    <text x="294" y="294" fill="#cccccc">, </text>
    <text x="304" y="294" fill="#9cdcfe">annotated</text>
    <text x="364" y="294" fill="#cccccc">)</text>
    <!-- cursor blink -->
    <rect x="374" y="283" width="7" height="13" fill="#00d4ff" opacity="0.85">
      <animate attributeName="opacity" values="0.85;0;0.85" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Bounding box overlays (simulating object detection) -->
  <rect x="148" y="98" width="58" height="38" rx="2" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.5"/>
  <text x="150" y="95" font-family="monospace" font-size="8" fill="#00d4ff" opacity="0.7">person 0.94</text>

  <!-- Monitor stand -->
  <rect x="295" y="350" width="50" height="14" rx="2" fill="#0d1a2e" stroke="#1e4a6e" stroke-width="1"/>
  <rect x="270" y="362" width="100" height="8" rx="3" fill="#0d1a2e" stroke="#1e4a6e" stroke-width="1"/>

  <!-- Floating data nodes -->
  <circle cx="590" cy="140" r="4" fill="#00d4ff" opacity="0.8"/>
  <circle cx="640" cy="110" r="3" fill="#7c3aed" opacity="0.7"/>
  <circle cx="670" cy="170" r="5" fill="#00d4ff" opacity="0.6"/>
  <circle cx="620" cy="200" r="3" fill="#4ade80" opacity="0.7"/>
  <circle cx="700" cy="140" r="2.5" fill="#f59e0b" opacity="0.6"/>

  <!-- Connecting lines between nodes -->
  <g stroke="#00d4ff" stroke-width="0.8" opacity="0.3">
    <line x1="590" y1="140" x2="640" y2="110"/>
    <line x1="640" y1="110" x2="670" y2="170"/>
    <line x1="670" y1="170" x2="620" y2="200"/>
    <line x1="670" y1="170" x2="700" y2="140"/>
    <line x1="590" y1="140" x2="620" y2="200"/>
    <line x1="700" y1="140" x2="640" y2="110"/>
  </g>

  <!-- Node labels -->
  <g font-family="monospace" font-size="8" fill="#00d4ff" opacity="0.6">
    <text x="556" y="142">input</text>
    <text x="646" y="105">conv</text>
    <text x="676" y="185">pool</text>
    <text x="600" y="214">relu</text>
    <text x="707" y="138">fc</text>
  </g>

  <!-- Bottom status bar on monitor -->
  <rect x="130" y="322" width="380" height="18" rx="0" fill="#0a1628" opacity="0.95"/>
  <text x="145" y="334" font-family="monospace" font-size="9" fill="#4ade80" opacity="0.9">● LIVE</text>
  <text x="185" y="334" font-family="monospace" font-size="9" fill="#569cd6" opacity="0.7">fps: 29.8</text>
  <text x="248" y="334" font-family="monospace" font-size="9" fill="#cccccc" opacity="0.5">objects: 3</text>
  <text x="328" y="334" font-family="monospace" font-size="9" fill="#f59e0b" opacity="0.6">conf: 0.94</text>
  <text x="402" y="334" font-family="monospace" font-size="9" fill="#cccccc" opacity="0.4">GPU 78%</text>

  <!-- Glasses reflection effect - subtle highlight -->
  <ellipse cx="250" cy="420" rx="90" ry="25" fill="none" stroke="#1e4a6e" stroke-width="1" opacity="0.4"/>
  <ellipse cx="430" cy="420" rx="90" ry="25" fill="none" stroke="#1e4a6e" stroke-width="1" opacity="0.4"/>
  <line x1="340" y1="420" x2="340" y2="408" stroke="#1e4a6e" stroke-width="1.5" opacity="0.5"/>

  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#000000;stop-opacity:0.55"/>
  </radialGradient>
  <rect width="760" height="500" fill="url(#vignette)"/>
</svg>
