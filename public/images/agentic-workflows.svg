<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#090d10"/>
      <stop offset="100%" style="stop-color:#0c1015"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="nodeblur"><feGaussianBlur stdDeviation="4"/></filter>
    <clipPath id="clip"><rect width="600" height="340"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="600" height="340" fill="url(#bg)"/>

    <!-- Glows -->
    <ellipse cx="160" cy="200" rx="200" ry="150" fill="url(#glow1)" filter="url(#blur)" opacity="0.7"/>
    <ellipse cx="480" cy="140" rx="180" ry="130" fill="url(#glow2)" filter="url(#blur)" opacity="0.6"/>

    <!-- Grid -->
    <g stroke="#151b25" stroke-width="0.5" opacity="0.7">
      <line x1="0" y1="56" x2="600" y2="56"/>
      <line x1="0" y1="113" x2="600" y2="113"/>
      <line x1="0" y1="170" x2="600" y2="170"/>
      <line x1="0" y1="227" x2="600" y2="227"/>
      <line x1="0" y1="284" x2="600" y2="284"/>
      <line x1="100" y1="0" x2="100" y2="340"/>
      <line x1="200" y1="0" x2="200" y2="340"/>
      <line x1="300" y1="0" x2="300" y2="340"/>
      <line x1="400" y1="0" x2="400" y2="340"/>
      <line x1="500" y1="0" x2="500" y2="340"/>
    </g>

    <!-- Flow edges (drawn first, under nodes) -->
    <g stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.45" stroke-dasharray="4 3">
      <!-- Input → Planner -->
      <path d="M 115,170 C 155,170 155,130 195,130"/>
      <!-- Input → Memory -->
      <path d="M 115,170 C 155,170 155,210 195,210"/>
      <!-- Planner → Executor -->
      <path d="M 285,130 C 325,130 325,155 365,170"/>
      <!-- Memory → Executor -->
      <path d="M 285,210 C 325,210 325,185 365,170"/>
      <!-- Executor → Tools -->
      <path d="M 455,170 C 495,170 495,110 530,100"/>
      <!-- Executor → Output -->
      <path d="M 455,170 C 495,170 495,230 530,240"/>
      <!-- Executor → Critic -->
      <path d="M 455,170 L 495,170"/>
    </g>

    <!-- Animated pulse on main flow path -->
    <path d="M 75,170 C 155,170 155,130 240,130 C 325,130 325,155 410,170 C 455,170 495,170 540,170"
          fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.3" stroke-dasharray="6 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-200" dur="3s" repeatCount="indefinite"/>
    </path>

    <!-- Node: INPUT -->
    <g transform="translate(75,170)">
      <circle r="36" fill="#0d1520" stroke="#6366f1" stroke-width="1.5" opacity="0.95"/>
      <circle r="36" fill="#6366f1" filter="url(#nodeblur)" opacity="0.15"/>
      <text x="0" y="-6" text-anchor="middle" font-family="monospace" font-size="8" fill="#a5b4fc" font-weight="bold">INPUT</text>
      <text x="0" y="8" text-anchor="middle" font-family="monospace" font-size="7" fill="#6366f1">AGENT</text>
    </g>

    <!-- Node: PLANNER -->
    <g transform="translate(240,130)">
      <rect x="-42" y="-24" width="84" height="48" rx="6" fill="#0d1520" stroke="#6366f1" stroke-width="1.5" opacity="0.95"/>
      <rect x="-42" y="-24" width="84" height="48" rx="6" fill="#6366f1" filter="url(#nodeblur)" opacity="0.12"/>
      <text x="0" y="-5" text-anchor="middle" font-family="monospace" font-size="8" fill="#a5b4fc" font-weight="bold">PLANNER</text>
      <text x="0" y="9" text-anchor="middle" font-family="monospace" font-size="7" fill="#6366f1">LLM AGENT</text>
    </g>

    <!-- Node: MEMORY -->
    <g transform="translate(240,210)">
      <rect x="-38" y="-22" width="76" height="44" rx="6" fill="#0d1520" stroke="#22d3ee" stroke-width="1.5" opacity="0.95"/>
      <rect x="-38" y="-22" width="76" height="44" rx="6" fill="#22d3ee" filter="url(#nodeblur)" opacity="0.1"/>
      <text x="0" y="-4" text-anchor="middle" font-family="monospace" font-size="8" fill="#67e8f9" font-weight="bold">MEMORY</text>
      <text x="0" y="9" text-anchor="middle" font-family="monospace" font-size="7" fill="#22d3ee">VECTOR DB</text>
    </g>

    <!-- Node: EXECUTOR -->
    <g transform="translate(410,170)">
      <circle r="42" fill="#0d1520" stroke="#22d3ee" stroke-width="2" opacity="0.95"/>
      <circle r="42" fill="#22d3ee" filter="url(#nodeblur)" opacity="0.12"/>
      <circle r="34" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.3" stroke-dasharray="3 3"/>
      <text x="0" y="-6" text-anchor="middle" font-family="monospace" font-size="9" fill="#67e8f9" font-weight="bold">EXECUTOR</text>
      <text x="0" y="9" text-anchor="middle" font-family="monospace" font-size="7" fill="#22d3ee">ORCHESTRATOR</text>
    </g>

    <!-- Node: TOOLS -->
    <g transform="translate(540,100)">
      <rect x="-34" y="-20" width="68" height="40" rx="4" fill="#0d1520" stroke="#4ade80" stroke-width="1.2" opacity="0.95"/>
      <text x="0" y="-4" text-anchor="middle" font-family="monospace" font-size="8" fill="#86efac" font-weight="bold">TOOLS</text>
      <text x="0" y="8" text-anchor="middle" font-family="monospace" font-size="7" fill="#4ade80">APIs / MCP</text>
    </g>

    <!-- Node: OUTPUT -->
    <g transform="translate(540,240)">
      <rect x="-34" y="-20" width="68" height="40" rx="4" fill="#0d1520" stroke="#f59e0b" stroke-width="1.2" opacity="0.95"/>
      <text x="0" y="-4" text-anchor="middle" font-family="monospace" font-size="8" fill="#fcd34d" font-weight="bold">OUTPUT</text>
      <text x="0" y="8" text-anchor="middle" font-family="monospace" font-size="7" fill="#f59e0b">RESPONSE</text>
    </g>

    <!-- Floating mini labels -->
    <g font-family="monospace" font-size="8" opacity="0.4">
      <text x="30" y="125" fill="#6366f1">task:</text>
      <text x="30" y="137" fill="#a5b4fc">"analyse Q2"</text>
      <text x="30" y="220" fill="#22d3ee">context: 4096</text>
      <text x="30" y="232" fill="#22d3ee">tokens cached</text>
    </g>

    <!-- Vignette -->
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0.6"/>
    </radialGradient>
    <rect width="600" height="340" fill="url(#vig)"/>
  </g>
</svg>
