<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0a18"/>
      <stop offset="100%" style="stop-color:#100c1c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="5"/></filter>
    <clipPath id="clip"><rect width="600" height="340"/></clipPath>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="600" height="340" fill="url(#bg)"/>
    <ellipse cx="300" cy="170" rx="220" ry="150" fill="#7c3aed" filter="url(#glow)" opacity="0.2"/>
    <!-- Grid -->
    <g stroke="#1a1530" stroke-width="0.5" opacity="0.7">
      <line x1="0" y1="68" x2="600" y2="68"/><line x1="0" y1="136" x2="600" y2="136"/>
      <line x1="0" y1="204" x2="600" y2="204"/><line x1="0" y1="272" x2="600" y2="272"/>
      <line x1="100" y1="0" x2="100" y2="340"/><line x1="200" y1="0" x2="200" y2="340"/>
      <line x1="300" y1="0" x2="300" y2="340"/><line x1="400" y1="0" x2="400" y2="340"/>
      <line x1="500" y1="0" x2="500" y2="340"/>
    </g>
    <!-- Transformer attention matrix (stylised) -->
    <g opacity="0.85">
      <!-- Row 0 -->
      <rect x="155" y="75" width="22" height="22" rx="2" fill="#7c3aed" opacity="0.9"/><rect x="180" y="75" width="22" height="22" rx="2" fill="#6d28d9" opacity="0.6"/><rect x="205" y="75" width="22" height="22" rx="2" fill="#4c1d95" opacity="0.35"/><rect x="230" y="75" width="22" height="22" rx="2" fill="#3b0764" opacity="0.2"/><rect x="255" y="75" width="22" height="22" rx="2" fill="#2e1065" opacity="0.1"/>
      <!-- Row 1 -->
      <rect x="155" y="100" width="22" height="22" rx="2" fill="#6d28d9" opacity="0.6"/><rect x="180" y="100" width="22" height="22" rx="2" fill="#7c3aed" opacity="0.95"/><rect x="205" y="100" width="22" height="22" rx="2" fill="#6d28d9" opacity="0.55"/><rect x="230" y="100" width="22" height="22" rx="2" fill="#4c1d95" opacity="0.3"/><rect x="255" y="100" width="22" height="22" rx="2" fill="#3b0764" opacity="0.15"/>
      <!-- Row 2 -->
      <rect x="155" y="125" width="22" height="22" rx="2" fill="#4c1d95" opacity="0.3"/><rect x="180" y="125" width="22" height="22" rx="2" fill="#6d28d9" opacity="0.6"/><rect x="205" y="125" width="22" height="22" rx="2" fill="#7c3aed" opacity="0.9"/><rect x="230" y="125" width="22" height="22" rx="2" fill="#6d28d9" opacity="0.5"/><rect x="255" y="125" width="22" height="22" rx="2" fill="#4c1d95" opacity="0.25"/>
      <!-- Row 3 -->
      <rect x="155" y="150" width="22" height="22" rx="2" fill="#3b0764" opacity="0.15"/><rect x="180" y="150" width="22" height="22" rx="2" fill="#4c1d95" opacity="0.35"/><rect x="205" y="150" width="22" height="22" rx="2" fill="#6d28d9" opacity="0.65"/><rect x="230" y="150" width="22" height="22" rx="2" fill="#7c3aed" opacity="0.92"/><rect x="255" y="150" width="22" height="22" rx="2" fill="#6d28d9" opacity="0.55"/>
      <!-- Row 4 -->
      <rect x="155" y="175" width="22" height="22" rx="2" fill="#2e1065" opacity="0.1"/><rect x="180" y="175" width="22" height="22" rx="2" fill="#3b0764" opacity="0.2"/><rect x="205" y="175" width="22" height="22" rx="2" fill="#4c1d95" opacity="0.4"/><rect x="230" y="175" width="22" height="22" rx="2" fill="#6d28d9" opacity="0.6"/><rect x="255" y="175" width="22" height="22" rx="2" fill="#7c3aed" opacity="0.88"/>
    </g>
    <!-- Label -->
    <text x="155" y="218" font-family="monospace" font-size="9" fill="#a78bfa" opacity="0.5">attention weights</text>
    <!-- Chat bubbles on right -->
    <rect x="330" y="75" width="220" height="44" rx="8" fill="#1e1535" stroke="#6d28d9" stroke-width="1" opacity="0.9"/>
    <text x="345" y="94" font-family="monospace" font-size="9" fill="#c4b5fd">Summarise Q2 revenue report</text>
    <text x="345" y="108" font-family="monospace" font-size="9" fill="#7c3aed" opacity="0.7">and flag anomalies.</text>
    <rect x="330" y="132" width="220" height="56" rx="8" fill="#130e20" stroke="#4c1d95" stroke-width="1" opacity="0.9"/>
    <text x="345" y="150" font-family="monospace" font-size="9" fill="#a78bfa" opacity="0.8">Revenue up 12.4% YoY.</text>
    <text x="345" y="164" font-family="monospace" font-size="9" fill="#a78bfa" opacity="0.8">⚠ Anomaly: APAC Q2</text>
    <text x="345" y="178" font-family="monospace" font-size="9" fill="#a78bfa" opacity="0.8">variance +34% vs forecast.</text>
    <rect x="330" y="202" width="220" height="32" rx="8" fill="#1e1535" stroke="#6d28d9" stroke-width="1" opacity="0.9"/>
    <text x="345" y="216" font-family="monospace" font-size="9" fill="#c4b5fd">Explain the APAC variance.</text>
    <text x="345" y="228" font-family="monospace" font-size="9" fill="#7c3aed" opacity="0.7">Root cause?</text>
    <!-- Cursor -->
    <rect x="340" y="252" width="140" height="26" rx="6" fill="#0e0a18" stroke="#4c1d95" stroke-width="1" opacity="0.7"/>
    <rect x="352" y="261" width="6" height="12" fill="#7c3aed" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
    </rect>
    <!-- Vignette -->
    <radialGradient id="vig" cx="50%" cy="50%" r="70%"><stop offset="0%" style="stop-color:#000;stop-opacity:0"/><stop offset="100%" style="stop-color:#000;stop-opacity:0.6"/></radialGradient>
    <rect width="600" height="340" fill="url(#vig)"/>
  </g>
</svg>
